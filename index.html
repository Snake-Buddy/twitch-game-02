<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Tug-o-War Overlay</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
</head>
<body>
    <div id="ui-container">
        <div id="meter-container">
    <div id="marker-left">CLIFF</div>
    <div id="meter-track">
        <div id="meter-bar"></div>
        <div id="center-line"></div>
    </div>
    <div id="marker-right">CLIFF</div>
</div>
        <h1 id="status-text">BATTLE BEGINS!</h1>
        <div id="score-board">
            TEAM PLAYER: <span id="p-count">0</span> | TEAM MONSTER: <span id="m-count">0</span>
        </div>
        <div id="instruction">Type !join player or !join monster</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
